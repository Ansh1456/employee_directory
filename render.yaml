databases:
  - name: pulsedir-db
    databaseName: pulsedir
    user: pulsedir_user

services:
  - type: web
    name: pulsedir-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsedir-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
